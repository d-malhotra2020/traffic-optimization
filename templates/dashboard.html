<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Flow Optimization - Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #09090b;
            color: #f4f4f5;
            line-height: 1.6;
        }
        
        .header {
            background: #18181b;
            border-bottom: 1px solid #27272a;
            padding: 20px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .status-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .metric-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
        }
        
        .metric-card:hover {
            border-color: #3f3f46;
            transform: translateY(-2px);
        }
        
        .metric-label {
            color: #a1a1aa;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .metric-change {
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .metric-change.positive {
            color: #10b981;
        }
        
        .metric-change.negative {
            color: #ef4444;
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .chart-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 24px;
        }
        
        .chart-title {
            color: #f4f4f5;
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .chart-container {
            height: 300px;
            position: relative;
        }
        
        .optimization-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        .optimization-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 24px;
        }
        
        .optimization-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #27272a;
        }
        
        .optimization-item:last-child {
            border-bottom: none;
        }
        
        .optimization-details {
            flex: 1;
        }
        
        .optimization-intersection {
            font-weight: 600;
            color: #f4f4f5;
            margin-bottom: 4px;
        }
        
        .optimization-improvement {
            font-size: 0.875rem;
            color: #a1a1aa;
        }
        
        .optimization-confidence {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .intersection-map {
            height: 400px;
            background: #27272a;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .map-intersection {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .map-intersection.green {
            background: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        
        .map-intersection.yellow {
            background: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }
        
        .map-intersection.red {
            background: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
        }
        
        .map-intersection:hover {
            transform: scale(1.5);
            z-index: 10;
        }
        
        .controls-section {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            align-items: center;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .control-label {
            color: #a1a1aa;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .control-button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .control-button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        
        .control-select {
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #f4f4f5;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.875rem;
        }
        
        .alert-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fecaca;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
        }
        
        .alert-banner.show {
            display: block;
        }
        
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .optimization-grid {
                grid-template-columns: 1fr;
            }
            
            .controls-grid {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo">🚦 Traffic Control Center</div>
            </div>
            <div class="status-section">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span id="systemStatus">System Operational</span>
                </div>
                <div style="color: #a1a1aa; font-size: 0.875rem;" id="lastUpdated">
                    Last updated: --:--
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="alert-banner" id="alertBanner">
            <strong>Alert:</strong> <span id="alertMessage"></span>
        </div>

        <div class="controls-section">
            <div class="controls-grid">
                <div class="control-group">
                    <label class="control-label">City Filter</label>
                    <select class="control-select" id="cityFilter">
                        <option value="">All Cities</option>
                        <option value="new_york">New York</option>
                        <option value="los_angeles">Los Angeles</option>
                        <option value="chicago">Chicago</option>
                        <option value="houston">Houston</option>
                        <option value="phoenix">Phoenix</option>
                    </select>
                </div>
                <div class="control-group">
                    <label class="control-label">Simulation Speed</label>
                    <select class="control-select" id="simulationSpeed">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="2">2x</option>
                        <option value="5">5x</option>
                    </select>
                </div>
                <div class="control-group">
                    <label class="control-label">Quick Actions</label>
                    <button class="control-button" onclick="runOptimization()">Optimize All</button>
                </div>
                <div class="control-group">
                    <label class="control-label">Simulation</label>
                    <button class="control-button" onclick="runScenario()">Run Scenario</button>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="metric-card">
                <div class="metric-label">Total Intersections</div>
                <div class="metric-value" style="color: #3b82f6;" id="totalIntersections">--</div>
                <div class="metric-change">Across 5 cities</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Active Vehicles</div>
                <div class="metric-value" style="color: #10b981;" id="activeVehicles">--</div>
                <div class="metric-change positive" id="vehicleChange">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Avg Speed</div>
                <div class="metric-value" style="color: #f59e0b;" id="avgSpeed">--</div>
                <div class="metric-change" id="speedChange">km/h</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Efficiency Gain</div>
                <div class="metric-value" style="color: #8b5cf6;" id="efficiencyGain">--%</div>
                <div class="metric-change positive">vs baseline</div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-card">
                <div class="chart-title">
                    📈 Traffic Metrics History
                </div>
                <div class="chart-container">
                    <canvas id="metricsChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">
                    🎯 Live Intersection Map
                </div>
                <div class="intersection-map" id="intersectionMap">
                    <!-- Intersections will be dynamically added here -->
                </div>
            </div>
        </div>

        <div class="optimization-grid">
            <div class="optimization-card">
                <div class="chart-title">
                    🔧 Recent Optimizations
                </div>
                <div id="optimizationList">
                    <!-- Optimization results will be added here -->
                </div>
            </div>
            <div class="optimization-card">
                <div class="chart-title">
                    ⚠️ Congestion Hotspots
                </div>
                <div id="hotspotsList">
                    <!-- Hotspots will be added here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let metricsChart;
        let dashboardData = {};
        let updateInterval;

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            initializeCharts();
            startDataUpdates();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('cityFilter').addEventListener('change', filterByCity);
            document.getElementById('simulationSpeed').addEventListener('change', changeSimulationSpeed);
        }

        function initializeCharts() {
            const ctx = document.getElementById('metricsChart').getContext('2d');
            
            metricsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Avg Speed (km/h)',
                            data: [],
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: 'Congestion Level (%)',
                            data: [],
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: 'Efficiency Improvement (%)',
                            data: [],
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#a1a1aa'
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#a1a1aa' },
                            grid: { color: '#27272a' }
                        },
                        y: {
                            ticks: { color: '#a1a1aa' },
                            grid: { color: '#27272a' }
                        }
                    }
                }
            });
        }

        function startDataUpdates() {
            fetchDashboardData();
            updateInterval = setInterval(fetchDashboardData, 5000); // Update every 5 seconds
        }

        async function fetchDashboardData() {
            try {
                // Fetch traffic metrics (this endpoint works)
                const metricsResponse = await fetch('/api/v1/traffic/metrics');
                const metricsData = await metricsResponse.json();
                
                // Fetch intersection data  
                const intersectionsResponse = await fetch('/api/v1/traffic/intersections?limit=50');
                const intersectionsData = await intersectionsResponse.json();
                
                // Create dashboard data structure from working endpoints
                const dashboardData = {
                    system_overview: {
                        total_intersections: intersectionsData.total_intersections || 144,
                        total_vehicles: metricsData.current_metrics.total_vehicles || 0,
                        cities_served: 5,
                        system_uptime: Math.floor(Date.now() / 1000) % 86400,
                        last_updated: new Date().toISOString()
                    },
                    performance_metrics: metricsData.current_metrics
                };
                
                updateDashboard(dashboardData);
                
                // Try to fetch optimizations (working endpoint)
                try {
                    const optimizationResponse = await fetch('/api/v1/optimization/optimize?limit=10');
                    const optimizationData = await optimizationResponse.json();
                    updateOptimizations(optimizationData.optimization_results || []);
                } catch (e) {
                    console.log('Optimizations endpoint not ready yet');
                    updateOptimizations([]);
                }
                
                // Create simple hotspots from intersection data
                const hotspots = Object.entries(intersectionsData.intersections || {})
                    .slice(0, 8)
                    .map(([id, data]) => ({
                        intersection_id: id,
                        predicted_congestion: (1 - data.efficiency_score),
                        severity: data.efficiency_score < 0.5 ? 'high' : 'moderate',
                        estimated_duration: Math.floor(Math.random() * 30) + 15
                    }));
                
                updateHotspots(hotspots);
                
                // Update intersection map
                updateIntersectionMap(intersectionsData.intersections || {});
                
                // Update last updated time
                document.getElementById('lastUpdated').textContent = 
                    `Last updated: ${new Date().toLocaleTimeString()}`;
                
            } catch (error) {
                console.error('Error fetching dashboard data:', error);
                showAlert('Connection error - retrying...');
            }
        }

        function updateDashboard(data) {
            const { system_overview, performance_metrics } = data;
            
            document.getElementById('totalIntersections').textContent = 
                system_overview.total_intersections.toLocaleString();
            document.getElementById('activeVehicles').textContent = 
                system_overview.total_vehicles.toLocaleString();
            document.getElementById('avgSpeed').textContent = 
                performance_metrics.average_speed.toFixed(1);
            document.getElementById('efficiencyGain').textContent = 
                performance_metrics.efficiency_improvement.toFixed(1) + '%';
            
            // Update vehicle change indicator
            const congestionLevel = performance_metrics.congestion_level;
            const vehicleChange = document.getElementById('vehicleChange');
            if (congestionLevel < 0.3) {
                vehicleChange.textContent = '↗ Normal flow';
                vehicleChange.className = 'metric-change positive';
            } else if (congestionLevel < 0.7) {
                vehicleChange.textContent = '→ Moderate traffic';
                vehicleChange.className = 'metric-change';
            } else {
                vehicleChange.textContent = '↗ Heavy traffic';
                vehicleChange.className = 'metric-change negative';
            }
            
            // Update system status
            const statusEl = document.getElementById('systemStatus');
            if (performance_metrics.efficiency_improvement > 10) {
                statusEl.textContent = 'System Optimal';
            } else if (performance_metrics.efficiency_improvement > 5) {
                statusEl.textContent = 'System Good';
            } else {
                statusEl.textContent = 'System Normal';
            }
        }

        function updateChart(historyData) {
            if (!historyData || historyData.length === 0) return;
            
            const labels = historyData.map(d => {
                const time = new Date(d.timestamp * 1000);
                return time.getHours().toString().padStart(2, '0') + ':' + 
                       time.getMinutes().toString().padStart(2, '0');
            });
            
            metricsChart.data.labels = labels;
            metricsChart.data.datasets[0].data = historyData.map(d => d.average_speed);
            metricsChart.data.datasets[1].data = historyData.map(d => d.congestion_level * 100);
            metricsChart.data.datasets[2].data = historyData.map(d => d.efficiency_improvement);
            
            metricsChart.update();
        }

        function updateOptimizations(optimizations) {
            const container = document.getElementById('optimizationList');
            container.innerHTML = '';
            
            optimizations.slice(0, 8).forEach(opt => {
                const item = document.createElement('div');
                item.className = 'optimization-item';
                
                const timeDiff = Math.floor(opt.time_ago_seconds / 60);
                const timeText = timeDiff < 1 ? 'Just now' : `${timeDiff}m ago`;
                
                item.innerHTML = `
                    <div class="optimization-details">
                        <div class="optimization-intersection">${opt.intersection_id}</div>
                        <div class="optimization-improvement">
                            ${opt.expected_improvement.toFixed(1)}% improvement • ${timeText}
                        </div>
                    </div>
                    <div class="optimization-confidence">
                        ${Math.round(opt.confidence * 100)}%
                    </div>
                `;
                
                container.appendChild(item);
            });
        }

        function updateHotspots(hotspots) {
            const container = document.getElementById('hotspotsList');
            container.innerHTML = '';
            
            hotspots.slice(0, 8).forEach(hotspot => {
                const item = document.createElement('div');
                item.className = 'optimization-item';
                
                const severityColor = {
                    'severe': '#ef4444',
                    'high': '#f59e0b', 
                    'moderate': '#3b82f6'
                }[hotspot.severity] || '#3b82f6';
                
                item.innerHTML = `
                    <div class="optimization-details">
                        <div class="optimization-intersection">${hotspot.intersection_id}</div>
                        <div class="optimization-improvement">
                            ${Math.round(hotspot.predicted_congestion * 100)}% congestion • ${hotspot.estimated_duration}min
                        </div>
                    </div>
                    <div class="optimization-confidence" style="background: rgba(${severityColor === '#ef4444' ? '239, 68, 68' : severityColor === '#f59e0b' ? '245, 158, 11' : '59, 130, 246'}, 0.1); color: ${severityColor};">
                        ${hotspot.severity}
                    </div>
                `;
                
                container.appendChild(item);
            });
        }

        function updateIntersectionMap(intersections) {
            const mapContainer = document.getElementById('intersectionMap');
            mapContainer.innerHTML = ''; // Clear existing intersections
            
            // Take first 20 intersections for the map
            Object.entries(intersections).slice(0, 20).forEach(([id, data], index) => {
                const dot = document.createElement('div');
                dot.className = 'map-intersection';
                
                // Position randomly but distributed
                const x = 10 + (index % 5) * 80 + Math.random() * 20;
                const y = 10 + Math.floor(index / 5) * 80 + Math.random() * 20;
                
                dot.style.left = x + 'px';
                dot.style.top = y + 'px';
                
                // Color based on signal state and efficiency
                if (data.signal_state === 'green' && data.efficiency_score > 0.7) {
                    dot.classList.add('green');
                } else if (data.efficiency_score < 0.5) {
                    dot.classList.add('red');
                } else {
                    dot.classList.add('yellow');
                }
                
                // Tooltip with intersection info
                dot.title = `${id}\nSignal: ${data.signal_state}\nEfficiency: ${Math.round(data.efficiency_score * 100)}%\nThroughput: ${data.throughput}/min`;
                
                mapContainer.appendChild(dot);
            });
        }

        function showAlert(message) {
            const banner = document.getElementById('alertBanner');
            const messageEl = document.getElementById('alertMessage');
            
            messageEl.textContent = message;
            banner.classList.add('show');
            
            setTimeout(() => {
                banner.classList.remove('show');
            }, 5000);
        }

        function filterByCity() {
            const selectedCity = document.getElementById('cityFilter').value;
            // Implementation would filter the displayed data by city
            console.log('Filtering by city:', selectedCity);
        }

        function changeSimulationSpeed() {
            const speed = document.getElementById('simulationSpeed').value;
            console.log('Changing simulation speed to:', speed);
            // This would call the API to change simulation speed
        }

        async function runOptimization() {
            try {
                showAlert('Running optimization for all intersections...');
                // In a real implementation, this would trigger system-wide optimization
                console.log('Running system-wide optimization');
            } catch (error) {
                showAlert('Failed to run optimization');
            }
        }

        async function runScenario() {
            try {
                const response = await fetch('/api/v1/traffic/simulate', {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.simulation_completed) {
                    showAlert('Simulation scenario completed successfully');
                } else {
                    showAlert('Failed to run simulation scenario');
                }
            } catch (error) {
                showAlert('Failed to run simulation scenario');
            }
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        });
    </script>
</body>
</html>
